[project]
name = "SoloSprintForConfluence"
version = "0.1.0"
description = "A personal task management tool using Confluence databases with relative estimation, cycles, and velocity tracking."
readme = "README.md"
requires-python = ">=3.14,<3.15"
dependencies = []

[dependency-groups]
dev = [
    "pyright>=1.1.0",
    "ruff>=0.9",
]

[tool.ruff]
target-version = "py314"
src = ["."]

[tool.ruff.lint]
extend-select = [
    "I",   # isort
    "UP",  # pyupgrade
]
